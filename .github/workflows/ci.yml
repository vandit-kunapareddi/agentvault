name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run if a new commit lands on the same PR / branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck checkpoint
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build dashboard
        # `next build` runs its own typecheck against the dashboard, including
        # the per-route generated types that a standalone tsc would not see
        # for newly-added routes.
        run: npm run build:dashboard
